<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bezier Curve Editor</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    display: flex;
    height: 100vh;
    background: #f5f6f8;
  }

  #panel {
    width: 320px;
    padding: 16px;
    border-right: 1px solid #e5e7eb;
    box-sizing: border-box;
    background: #ffffff;
  }

  #panel h3 {
    margin: 0 0 12px 0;
    font-weight: 600;
    font-size: 18px;
    color: #111827;
  }

  #canvasWrap {
    flex: 1;
    position: relative;
    background: #ffffff;
  }

  #canvas {
    width: 100%;
    height: 100%;
    cursor: crosshair;
    touch-action: none;
    display: block;
  }

  #hitLayer {
    position: absolute;
    inset: 0;
    touch-action: none;
  }

  button, input {
    width: 100%;
    margin-top: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    font-size: 14px;
  }

  button {
    background: #f9fafb;
    cursor: pointer;
    transition: 0.15s ease;
  }

  button:hover {
    background: #f3f4f6;
  }

  label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 12px;
    font-size: 14px;
    color: #374151;
  }

  .sliderRow {
    display: grid;
    grid-template-columns: 20px 1fr 60px;
    align-items: center;
    gap: 10px;
  }

  .tValue {
    font-size: 12px;
    color: #111827;
    font-variant-numeric: tabular-nums;
    min-width: 50px;
    text-align: right;
  }

  input[type="range"] {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  input[type="checkbox"] {
    width: auto;
    transform: scale(1.1);
    margin: 0;
    cursor: pointer;
  }

  p {
    font-size: 12px;
    color: #6b7280;
    margin-top: 12px;
    line-height: 1.4;
  }

  @media (max-width: 768px) {
    body { flex-direction: column; }

    #panel {
      width: 100%;
      height: 260px;
      border-right: none;
      border-top: 1px solid #e5e7eb;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      overflow-y: auto;
      z-index: 10;
    }

    #canvasWrap {
      width: 100%;
      height: calc(100vh - 260px);
    }
  }
</style>
</head>

<body>

<div id="panel">
  <h3>Bezier Curve Editor</h3>

  <label>
    <div style="display:flex;align-items:center;gap:10px;">
      <input type="checkbox" id="showHull" checked />
      <span>Show convex hull</span>
    </div>
  </label>

  <label class="sliderRow">
    <span>t</span>
    <input type="range" id="tSlider" min="0" max="1" step="0.001" value="0" />
    <span class="tValue" id="tValue">0.000</span>
  </label>

  <button id="clearBtn">Clear</button>
  <button id="toggleBtn">Play</button>
  <button id="resetBtn">Reset</button>
  <button id="fullBtn">Full curve</button>

  <p>Click to add points, drag to move. Ctrl+Z undo.</p>
</div>

<div id="canvasWrap">
  <canvas id="canvas"></canvas>
  <div id="hitLayer"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hitLayer = document.getElementById('hitLayer');

let points = [];
let history = [];
let draggingPoint = null;

let t = 0;
let playing = false;
let anim = null;

const showHull = document.getElementById('showHull');
const tSlider = document.getElementById('tSlider');
const tValue = document.getElementById('tValue');

const toggleBtn = document.getElementById('toggleBtn');
const resetBtn = document.getElementById('resetBtn');
const clearBtn = document.getElementById('clearBtn');
const fullBtn = document.getElementById('fullBtn');

const HIT_RADIUS = 18;

/* resize */
function resize(){
  const r = canvas.getBoundingClientRect();
  canvas.width = r.width;
  canvas.height = r.height;
  draw();
}
window.addEventListener('resize', resize);
resize();

/* utils */
function getPos(e){
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function save(){ history.push(JSON.stringify(points)); }

function undo(){
  if(history.length){
    points = JSON.parse(history.pop());
    draw();
  }
}

window.addEventListener('keydown', e=>{
  if(e.ctrlKey && e.key === 'z') undo();
});

function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

function lerp(a,b,t){
  return { x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t };
}

/* de Casteljau */
function deCasteljauLevels(pts,t){
  let levels=[pts];
  let cur=pts;

  while(cur.length>1){
    let next=[];
    for(let i=0;i<cur.length-1;i++){
      next.push(lerp(cur[i],cur[i+1],t));
    }
    levels.push(next);
    cur=next;
  }
  return levels;
}

/* convex hull */
function convexHull(pts){
  let s=[...pts].sort((a,b)=>a.x-b.x||a.y-b.y);
  let cross=(o,a,b)=>(a.x-o.x)*(b.y-o.y)-(a.y-o.y)*(b.x-o.x);

  let low=[], up=[];

  for(let p of s){
    while(low.length>1 && cross(low.at(-2),low.at(-1),p)<=0) low.pop();
    low.push(p);
  }

  for(let i=s.length-1;i>=0;i--){
    let p=s[i];
    while(up.length>1 && cross(up.at(-2),up.at(-1),p)<=0) up.pop();
    up.push(p);
  }

  up.pop(); low.pop();
  return low.concat(up);
}

/* input */
hitLayer.addEventListener('pointerdown', e=>{
  const m = getPos(e);

  for(let i=0;i<points.length;i++){
    if(dist(points[i],m)<HIT_RADIUS){
      draggingPoint=i;
      save();
      return;
    }
  }

  save();
  points.push(m);
  draw();
});

hitLayer.addEventListener('pointermove', e=>{
  if(draggingPoint===null) return;
  points[draggingPoint]=getPos(e);
  draw();
});

hitLayer.addEventListener('pointerup', ()=> draggingPoint=null);
hitLayer.addEventListener('pointercancel', ()=> draggingPoint=null);

/* draw */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawHull();
  drawBezier();
  drawDeCasteljau();
  drawPoints();
}

function drawHull(){
  if(!showHull.checked || points.length<2) return;

  let h = convexHull(points);

  ctx.beginPath();
  ctx.moveTo(h[0].x,h[0].y);
  for(let i=1;i<h.length;i++) ctx.lineTo(h[i].x,h[i].y);

  ctx.closePath();
  ctx.strokeStyle="#777";
  ctx.lineWidth=2;
  ctx.stroke();
}

function drawBezier(){
  if(points.length < 2) return;

  // t = 0 › nic nie rysuj
  if(t <= 0) return;

  const steps = 400;

  ctx.beginPath();

  let first = true;

  for(let i = 0; i <= steps; i++){
    let tt = i / steps;

    // ograniczenie zakresu tylko dla animacji
    if(t < 1 && tt > t) break;

    const p = deCasteljauLevels(points, tt).at(-1)[0];

    if(first){
      ctx.moveTo(p.x, p.y);
      first = false;
    } else {
      ctx.lineTo(p.x, p.y);
    }
  }

  ctx.strokeStyle = "blue";
  ctx.lineWidth = 4;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  ctx.stroke();
}

function drawDeCasteljau(){
  if(points.length < 2) return;
  if(t <= 0 || t >= 1) return;

  let levels = deCasteljauLevels(points, t);

  for(let k = 0; k < levels.length; k++){
    let lvl = levels[k];

    ctx.beginPath();
    for(let i = 0; i < lvl.length; i++){
      if(i === 0) ctx.moveTo(lvl[i].x, lvl[i].y);
      else ctx.lineTo(lvl[i].x, lvl[i].y);
    }
    ctx.strokeStyle = "rgba(0,0,0,0.3)";
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  for(let k = 0; k < levels.length - 1; k++){
    let a = levels[k];
    let b = levels[k + 1];

    for(let i = 0; i < b.length; i++){
      let child = b[i];

      ctx.beginPath();
      ctx.moveTo(a[i].x, a[i].y);
      ctx.lineTo(child.x, child.y);
      ctx.strokeStyle = "rgba(0,0,0,0.6)";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(child.x, child.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0,0,0,0.85)";
      ctx.fill();
    }
  }

  let p = levels.at(-1)[0];
  ctx.beginPath();
  ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
  ctx.fillStyle = "blue";
  ctx.fill();
}

function drawPoints(){
  for(let i=0;i<points.length;i++){
    let p=points[i];

    ctx.beginPath();
    ctx.arc(p.x,p.y,10,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();

    ctx.strokeStyle="darkred";
    ctx.lineWidth=3;
    ctx.stroke();

    ctx.font="bold 22px Arial";
    ctx.fillStyle="black";
    ctx.fillText("P"+i,p.x+10,p.y-10);
  }
}

/* UI */
tSlider.oninput=e=>{
  t=parseFloat(e.target.value);
  tValue.textContent=t.toFixed(3);
  draw();
};

showHull.onchange=draw;

/* animation */
function animate(){
  if(!playing) return;

  t += 0.002;
  if(t > 1) t = 0;

  tSlider.value = t;
  tValue.textContent = t.toFixed(3);

  draw();
  anim = requestAnimationFrame(animate);
}

toggleBtn.onclick = () => {
  playing = !playing;

  if(playing){
    toggleBtn.textContent = "Pause";
    animate();
  } else {
    toggleBtn.textContent = "Play";
    cancelAnimationFrame(anim);
  }
};

resetBtn.onclick = () => {
  t = 0;
  tSlider.value = 0;
  tValue.textContent = "0.000";

  playing = false;
  toggleBtn.textContent = "Play";
  cancelAnimationFrame(anim);

  draw();
};

fullBtn.onclick = () => {
  t = 1;

  tSlider.value = 1;
  tValue.textContent = "1.000";

  playing = false;
  toggleBtn.textContent = "Play";
  cancelAnimationFrame(anim);

  draw();
};

clearBtn.onclick = () => {
  save();
  points = [];
  draw();
};

</script>
</body>
</html>
